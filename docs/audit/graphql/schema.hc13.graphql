type Query {
  auditLogs(entityName: String entityId: String userId: String skip: Int! take: Int!): [AuditLogDTO!]! @cost(complexity: 5)
  exportMyData: ExportDataDto @cost(complexity: 5)
  ticketTypes(eventId: UUID! unlockCode: String): [TicketTypeAvailabilityDto!]! @cost(complexity: 5)
  quoteTicketOrder(input: QuoteTicketOrderInput!): CheckoutQuote! @cost(complexity: 5)
  ticketOrder(reference: String!): TicketOrderStatusDto @cost(complexity: 5)
  landing: LandingPageData! @cost(complexity: 5)
  events: [EventListDto!]! @cost(complexity: 5)
  event(id: UUID!): DetailEventDto @cost(complexity: 5)
  dJs: [DJProfileListItemDto!]! @cost(complexity: 5)
  dj(id: UUID!): DJProfileDetailDto @cost(complexity: 5)
  followedDjs(userId: String!): [DJProfileListItemDto!]! @cost(complexity: 5)
  followerCount(djId: UUID!): Int! @cost(complexity: 5)
  isFollowingDj(djId: UUID! userId: String!): Boolean! @cost(complexity: 5)
  djApplication(id: UUID!): DJApplicationDto @cost(complexity: 5)
  djApplicationByUser(userId: String!): DJApplicationDto @cost(complexity: 5)
  djApplications: [DJApplicationDto!]! @cost(complexity: 5)
  pendingDjApplications: [DJApplicationDto!]! @cost(complexity: 5)
  hasPendingDjApplication(userId: String!): Boolean! @cost(complexity: 5)
  ticketsByUser(userId: String!): [TicketDto!]! @cost(complexity: 5)
  ticketsByEvent(eventId: UUID!): [TicketDto!]! @cost(complexity: 5)
  ticket(id: UUID!): TicketDto @cost(complexity: 5)
  genres: [GenreDto!]! @cost(complexity: 5)
  venues: [VenueDto!]! @cost(complexity: 5)
  venue(id: UUID!): VenueDto @cost(complexity: 5)
  contactMessages: [ContactMessageReadDto!]! @cost(complexity: 5)
  newsletters: [NewsletterDto!]! @cost(complexity: 5)
  djTop10Lists: [DJTop10ListDto!]! @cost(complexity: 5)
  djTop10(id: UUID!): DJTop10ReadDto @cost(complexity: 5)
  songs: [SongDto!]! @cost(complexity: 5)
  song(id: UUID!): SongDto @cost(complexity: 5)
  siteSettings: SiteSettingsDto! @cost(complexity: 5)
  galleryMedia(approvedOnly: Boolean): [GalleryMediaDto!]! @cost(complexity: 5)
  featuredGalleryMedia: [GalleryMediaDto!]! @cost(complexity: 5)
  galleryMediaItem(id: UUID!): GalleryMediaDto @cost(complexity: 5)
  galleryMediaByEvent(eventId: UUID!): [GalleryMediaDto!]! @cost(complexity: 5)
  galleryMediaByUser(userId: String!): [GalleryMediaDto!]! @cost(complexity: 5)
  landingHighlights(limit: Int! = 6): [EventHighlightDto!]! @cost(complexity: 5)
  allHighlights: [EventHighlightDto!]! @cost(complexity: 5)
  userById(userId: String!): UserDetailsDto @cost(complexity: 5)
  users: [AdminUserDto!]! @cost(complexity: 5)
  ticketTypesByEvent(eventId: UUID!): [TicketTypeDto!]! @cost(complexity: 5)
  djReviews(djId: UUID!): [DJReviewDto!]! @cost(complexity: 5)
  playlists: [PlaylistDto!]! @cost(complexity: 5)
  playlist(id: UUID!): PlaylistDto @cost(complexity: 5)
  myDjPlaylists(djProfileId: UUID!): [PlaylistDto!]! @cost(complexity: 5)
  fetchSongMetadata(url: String!): SongMetadataResult! @cost(complexity: 5)
  djMixes: [DJMixDto!]! @cost(complexity: 5)
  djMix(id: UUID!): DJMixDto @cost(complexity: 5)
  organizerApplicationByUser(userId: String!): OrganizerApplicationDto @cost(complexity: 5)
  organizerApplications: [OrganizerApplicationDto!]! @cost(complexity: 5)
  pendingEvents: [EventListDto!]! @cost(complexity: 5)
  myOrganizerEvents(userId: String!): [EventListDto!]! @cost(complexity: 5)
}

