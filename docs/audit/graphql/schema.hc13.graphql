type Mutation {
  createTicketOrder(input: CreateTicketOrderInput!): CreateTicketOrderPayload! @cost(complexity: 5)
  retryTicketOrderPayment(reference: String! provider: String): CreateTicketOrderPayload! @cost(complexity: 5)
  completeSandboxPayment(reference: String!): TicketOrderStatusDto! @cost(complexity: 5)
  reconcileTicketOrder(reference: String!): TicketOrderStatusDto! @cost(complexity: 5)
  redeemTicket(token: String! admits: Int): RedeemTicketPayload! @cost(complexity: 5)
  register(input: RegisterInput!): AuthPayload! @cost(complexity: 5)
  login(input: LoginInput!): AuthPayload! @cost(complexity: 5)
  forgotPassword(email: String!): Boolean! @cost(complexity: 5)
  resetPassword(input: ResetPasswordInput!): Boolean! @cost(complexity: 5)
  createEvent(input: CreateEventInput!): UUID! @cost(complexity: 5)
  updateEvent(id: UUID! input: UpdateEventInput!): Boolean! @cost(complexity: 5)
  deleteEvent(id: UUID!): Boolean! @cost(complexity: 5)
  createEventAsOrganizer(input: CreateEventInput!): UUID! @cost(complexity: 5)
  updateEventAsOrganizer(id: UUID! input: UpdateEventInput!): Boolean! @cost(complexity: 5)
  deleteEventAsOrganizer(id: UUID!): Boolean! @cost(complexity: 5)
  approveEvent(id: UUID!): Boolean! @cost(complexity: 5)
  rejectEvent(id: UUID! reason: String!): Boolean! @cost(complexity: 5)
  createDj(input: CreateDjInput!): UUID! @cost(complexity: 5)
  updateDj(id: UUID! input: UpdateDjInput!): Boolean! @cost(complexity: 5)
  deleteDj(id: UUID!): Boolean! @cost(complexity: 5)
  submitDJApplication(input: CreateDJApplicationInput!): DJApplicationDto! @cost(complexity: 5)
  approveDJApplication(applicationId: UUID! reviewedByAdminId: String!): DJApplicationDto! @cost(complexity: 5)
  rejectDJApplication(applicationId: UUID! reviewedByAdminId: String! rejectionReason: String): DJApplicationDto! @cost(complexity: 5)
  submitOrganizerApplication(input: CreateOrganizerApplicationInput!): OrganizerApplicationDto! @cost(complexity: 5)
  approveOrganizerApplication(applicationId: UUID!): OrganizerApplicationDto! @cost(complexity: 5)
  rejectOrganizerApplication(applicationId: UUID! rejectionReason: String): OrganizerApplicationDto! @cost(complexity: 5)
  createGenre(input: CreateGenreInput!): UUID! @cost(complexity: 5)
  updateGenre(id: UUID! input: UpdateGenreInput!): Boolean! @cost(complexity: 5)
  createVenue(input: CreateVenueInput!): UUID! @cost(complexity: 5)
  updateVenue(id: UUID! input: UpdateVenueInput!): Boolean! @cost(complexity: 5)
  deleteVenue(id: UUID!): Boolean! @cost(complexity: 5)
  createContactMessage(input: CreateContactMessageInput!): UUID! @cost(complexity: 5)
  deleteContactMessage(id: UUID!): Boolean! @cost(complexity: 5)
  subscribeNewsletter(input: CreateNewsletterInput!): NewsletterDto! @cost(complexity: 5)
  unsubscribeNewsletter(id: UUID!): Boolean! @cost(complexity: 5)
  createDjTop10Entry(input: CreateDjTop10Input!): UUID! @cost(complexity: 5)
  deleteDjTop10Entry(id: UUID!): Boolean! @cost(complexity: 5)
  createSong(input: CreateSongInput!): UUID! @cost(complexity: 5)
  createPlaylist(input: CreatePlaylistInput!): UUID! @cost(complexity: 5)
  updatePlaylist(id: UUID! input: UpdatePlaylistInput!): Boolean! @cost(complexity: 5)
  deletePlaylist(id: UUID!): Boolean! @cost(complexity: 5)
  addPlaylistSong(input: AddPlaylistSongInput!): UUID! @cost(complexity: 5)
  removePlaylistSong(id: UUID!): Boolean! @cost(complexity: 5)
  createDjMix(input: CreateDJMixInput!): UUID! @cost(complexity: 5)
  updateDjMix(id: UUID! input: UpdateDJMixInput!): Boolean! @cost(complexity: 5)
  deleteDjMix(id: UUID!): Boolean! @cost(complexity: 5)
  updateSiteSettings(input: UpdateSiteSettingsInput!): SiteSettingsDto! @cost(complexity: 5)
  createGalleryMedia(input: CreateGalleryMediaInput!): UUID! @cost(complexity: 5)
  updateGalleryMedia(id: UUID! input: UpdateGalleryMediaInput!): Boolean! @cost(complexity: 5)
  deleteGalleryMedia(id: UUID!): Boolean! @cost(complexity: 5)
  createEventHighlight(input: CreateEventHighlightDtoInput!): UUID! @cost(complexity: 5)
  updateEventHighlight(id: UUID! input: UpdateEventHighlightDtoInput!): Boolean! @cost(complexity: 5)
  setHighlightPublished(id: UUID! published: Boolean!): Boolean! @cost(complexity: 5)
  deleteEventHighlight(id: UUID!): Boolean! @cost(complexity: 5)
  likeGalleryMedia(id: UUID!): Boolean! @cost(complexity: 5)
  followDj(input: FollowDjInput!): Boolean! @cost(complexity: 5)
  unfollowDj(input: FollowDjInput!): Boolean! @cost(complexity: 5)
  purchaseTicket(input: PurchaseTicketInput!): TicketDto! @cost(complexity: 5)
  checkInTicket(ticketId: UUID!): Boolean! @cost(complexity: 5)
  cancelTicket(input: CancelTicketInput!): TicketDto @cost(complexity: 5)
  refundTicket(input: RefundTicketInput!): TicketDto @cost(complexity: 5)
  transferTicket(input: TransferTicketInput!): TicketDto @cost(complexity: 5)
  invalidateTicket(ticketId: UUID!): Boolean! @cost(complexity: 5)
  deleteTicket(ticketId: UUID!): Boolean! @cost(complexity: 5)
  createTicketType(input: CreateTicketTypeInput!): TicketTypeDto! @cost(complexity: 5)
  updateTicketType(input: UpdateTicketTypeInput!): TicketTypeDto! @cost(complexity: 5)
  deleteTicketType(id: UUID!): Boolean! @cost(complexity: 5)
  createDjReview(input: CreateDJReviewInput!): UUID! @cost(complexity: 5)
  updateUserProfile(input: UpdateUserProfileInput!): Boolean! @cost(complexity: 5)
  updateUserRole(userId: String! role: Int!): Boolean! @cost(complexity: 5)
  deleteUser(userId: String!): Boolean! @cost(complexity: 5)
  requestErasure: Boolean! @cost(complexity: 5)
