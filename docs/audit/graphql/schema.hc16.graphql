schema {
  query: Query
  mutation: Mutation
}

type Query {
  auditLogs(
    entityName: String
    entityId: String
    userId: String
    skip: Int!
    take: Int!
  ): [AuditLogDTO!]! @cost(weight: "10")
  exportMyData: ExportDataDto @cost(weight: "10")
  ticketTypes(eventId: UUID!, unlockCode: String): [TicketTypeAvailabilityDto!]!
    @cost(weight: "10")
  quoteTicketOrder(input: QuoteTicketOrderInput!): CheckoutQuote!
    @cost(weight: "10")
  ticketOrder(reference: String!): TicketOrderStatusDto @cost(weight: "10")
  landing: LandingPageData! @cost(weight: "10")
  events: [EventListDto!]! @cost(weight: "10")
  event(id: UUID!): DetailEventDto @cost(weight: "10")
  dJs: [DJProfileListItemDto!]! @cost(weight: "10")
  dj(id: UUID!): DJProfileDetailDto @cost(weight: "10")
  followedDjs(userId: String!): [DJProfileListItemDto!]! @cost(weight: "10")
  followerCount(djId: UUID!): Int! @cost(weight: "10")
  isFollowingDj(djId: UUID!, userId: String!): Boolean! @cost(weight: "10")
  djApplication(id: UUID!): DJApplicationDto @cost(weight: "10")
  djApplicationByUser(userId: String!): DJApplicationDto @cost(weight: "10")
  djApplications: [DJApplicationDto!]! @cost(weight: "10")
  pendingDjApplications: [DJApplicationDto!]! @cost(weight: "10")
  hasPendingDjApplication(userId: String!): Boolean! @cost(weight: "10")
  ticketsByUser(userId: String!): [TicketDto!]! @cost(weight: "10")
  ticketsByEvent(eventId: UUID!): [TicketDto!]! @cost(weight: "10")
  ticket(id: UUID!): TicketDto @cost(weight: "10")
  genres: [GenreDto!]! @cost(weight: "10")
  venues: [VenueDto!]! @cost(weight: "10")
  venue(id: UUID!): VenueDto @cost(weight: "10")
  contactMessages: [ContactMessageReadDto!]! @cost(weight: "10")
  newsletters: [NewsletterDto!]! @cost(weight: "10")
  djTop10Lists: [DJTop10ListDto!]! @cost(weight: "10")
  djTop10(id: UUID!): DJTop10ReadDto @cost(weight: "10")
  songs: [SongDto!]! @cost(weight: "10")
  song(id: UUID!): SongDto @cost(weight: "10")
  siteSettings: SiteSettingsDto! @cost(weight: "10")
  galleryMedia(approvedOnly: Boolean): [GalleryMediaDto!]! @cost(weight: "10")
  featuredGalleryMedia: [GalleryMediaDto!]! @cost(weight: "10")
  galleryMediaItem(id: UUID!): GalleryMediaDto @cost(weight: "10")
  galleryMediaByEvent(eventId: UUID!): [GalleryMediaDto!]! @cost(weight: "10")
  galleryMediaByUser(userId: String!): [GalleryMediaDto!]! @cost(weight: "10")
  landingHighlights(limit: Int! = 6): [EventHighlightDto!]! @cost(weight: "10")
  allHighlights: [EventHighlightDto!]! @cost(weight: "10")
  userById(userId: String!): UserDetailsDto @cost(weight: "10")
  users: [AdminUserDto!]! @cost(weight: "10")
  ticketTypesByEvent(eventId: UUID!): [TicketTypeDto!]! @cost(weight: "10")
  djReviews(djId: UUID!): [DJReviewDto!]! @cost(weight: "10")
  playlists: [PlaylistDto!]! @cost(weight: "10")
  playlist(id: UUID!): PlaylistDto @cost(weight: "10")
  myDjPlaylists(djProfileId: UUID!): [PlaylistDto!]! @cost(weight: "10")
  fetchSongMetadata(url: String!): SongMetadataResult! @cost(weight: "10")
  djMixes: [DJMixDto!]! @cost(weight: "10")
  djMix(id: UUID!): DJMixDto @cost(weight: "10")
  organizerApplicationByUser(userId: String!): OrganizerApplicationDto
    @cost(weight: "10")
  organizerApplications: [OrganizerApplicationDto!]! @cost(weight: "10")
  pendingEvents: [EventListDto!]! @cost(weight: "10")
  myOrganizerEvents(userId: String!): [EventListDto!]! @cost(weight: "10")
}

type Mutation {
  createTicketOrder(input: CreateTicketOrderInput!): CreateTicketOrderPayload!
    @cost(weight: "10")
  retryTicketOrderPayment(reference: String!, provider: String): CreateTicketOrderPayload!
    @cost(weight: "10")
  completeSandboxPayment(reference: String!): TicketOrderStatusDto!
    @cost(weight: "10")
  reconcileTicketOrder(reference: String!): TicketOrderStatusDto!
    @cost(weight: "10")
  redeemTicket(token: String!, admits: Int): RedeemTicketPayload!
    @cost(weight: "10")
  register(input: RegisterInput!): AuthPayload! @cost(weight: "10")
  login(input: LoginInput!): AuthPayload! @cost(weight: "10")
  forgotPassword(email: String!): Boolean! @cost(weight: "10")
  resetPassword(input: ResetPasswordInput!): Boolean! @cost(weight: "10")
  createEvent(input: CreateEventInput!): UUID! @cost(weight: "10")
  updateEvent(id: UUID!, input: UpdateEventInput!): Boolean! @cost(weight: "10")
  deleteEvent(id: UUID!): Boolean! @cost(weight: "10")
  createEventAsOrganizer(input: CreateEventInput!): UUID! @cost(weight: "10")
  updateEventAsOrganizer(id: UUID!, input: UpdateEventInput!): Boolean!
    @cost(weight: "10")
  deleteEventAsOrganizer(id: UUID!): Boolean! @cost(weight: "10")
  approveEvent(id: UUID!): Boolean! @cost(weight: "10")
  rejectEvent(id: UUID!, reason: String!): Boolean! @cost(weight: "10")
  createDj(input: CreateDjInput!): UUID! @cost(weight: "10")
  updateDj(id: UUID!, input: UpdateDjInput!): Boolean! @cost(weight: "10")
  deleteDj(id: UUID!): Boolean! @cost(weight: "10")
  submitDJApplication(input: CreateDJApplicationInput!): DJApplicationDto!
    @cost(weight: "10")
  approveDJApplication(applicationId: UUID!, reviewedByAdminId: String!): DJApplicationDto!
    @cost(weight: "10")
  rejectDJApplication(
    applicationId: UUID!
    reviewedByAdminId: String!
    rejectionReason: String
  ): DJApplicationDto! @cost(weight: "10")
  submitOrganizerApplication(input: CreateOrganizerApplicationInput!): OrganizerApplicationDto!
    @cost(weight: "10")
  approveOrganizerApplication(applicationId: UUID!): OrganizerApplicationDto!
    @cost(weight: "10")
  rejectOrganizerApplication(applicationId: UUID!, rejectionReason: String): OrganizerApplicationDto!
    @cost(weight: "10")
  createGenre(input: CreateGenreInput!): UUID! @cost(weight: "10")
  updateGenre(id: UUID!, input: UpdateGenreInput!): Boolean! @cost(weight: "10")
  createVenue(input: CreateVenueInput!): UUID! @cost(weight: "10")
  updateVenue(id: UUID!, input: UpdateVenueInput!): Boolean! @cost(weight: "10")
  deleteVenue(id: UUID!): Boolean! @cost(weight: "10")
  createContactMessage(input: CreateContactMessageInput!): UUID!
    @cost(weight: "10")
  deleteContactMessage(id: UUID!): Boolean! @cost(weight: "10")
  subscribeNewsletter(input: CreateNewsletterInput!): NewsletterDto!
    @cost(weight: "10")
  unsubscribeNewsletter(id: UUID!): Boolean! @cost(weight: "10")
  createDjTop10Entry(input: CreateDjTop10Input!): UUID! @cost(weight: "10")
  deleteDjTop10Entry(id: UUID!): Boolean! @cost(weight: "10")
  createSong(input: CreateSongInput!): UUID! @cost(weight: "10")
  createPlaylist(input: CreatePlaylistInput!): UUID! @cost(weight: "10")
  updatePlaylist(id: UUID!, input: UpdatePlaylistInput!): Boolean!
    @cost(weight: "10")
  deletePlaylist(id: UUID!): Boolean! @cost(weight: "10")
  addPlaylistSong(input: AddPlaylistSongInput!): UUID! @cost(weight: "10")
  removePlaylistSong(id: UUID!): Boolean! @cost(weight: "10")
  createDjMix(input: CreateDJMixInput!): UUID! @cost(weight: "10")
  updateDjMix(id: UUID!, input: UpdateDJMixInput!): Boolean! @cost(weight: "10")
  deleteDjMix(id: UUID!): Boolean! @cost(weight: "10")
  updateSiteSettings(input: UpdateSiteSettingsInput!): SiteSettingsDto!
    @cost(weight: "10")
  createGalleryMedia(input: CreateGalleryMediaInput!): UUID! @cost(weight: "10")
  updateGalleryMedia(id: UUID!, input: UpdateGalleryMediaInput!): Boolean!
    @cost(weight: "10")
  deleteGalleryMedia(id: UUID!): Boolean! @cost(weight: "10")
  createEventHighlight(input: CreateEventHighlightDtoInput!): UUID!
    @cost(weight: "10")
  updateEventHighlight(id: UUID!, input: UpdateEventHighlightDtoInput!): Boolean!
    @cost(weight: "10")
  setHighlightPublished(id: UUID!, published: Boolean!): Boolean!
    @cost(weight: "10")
  deleteEventHighlight(id: UUID!): Boolean! @cost(weight: "10")
  likeGalleryMedia(id: UUID!): Boolean! @cost(weight: "10")
  followDj(input: FollowDjInput!): Boolean! @cost(weight: "10")
  unfollowDj(input: FollowDjInput!): Boolean! @cost(weight: "10")
  purchaseTicket(input: PurchaseTicketInput!): TicketDto! @cost(weight: "10")
  checkInTicket(ticketId: UUID!): Boolean! @cost(weight: "10")
  cancelTicket(input: CancelTicketInput!): TicketDto @cost(weight: "10")
  refundTicket(input: RefundTicketInput!): TicketDto @cost(weight: "10")
  transferTicket(input: TransferTicketInput!): TicketDto @cost(weight: "10")
  invalidateTicket(ticketId: UUID!): Boolean! @cost(weight: "10")
  deleteTicket(ticketId: UUID!): Boolean! @cost(weight: "10")
  createTicketType(input: CreateTicketTypeInput!): TicketTypeDto!
    @cost(weight: "10")
  updateTicketType(input: UpdateTicketTypeInput!): TicketTypeDto!
    @cost(weight: "10")
  deleteTicketType(id: UUID!): Boolean! @cost(weight: "10")
  createDjReview(input: CreateDJReviewInput!): UUID! @cost(weight: "10")
  updateUserProfile(input: UpdateUserProfileInput!): Boolean!
    @cost(weight: "10")
  updateUserRole(userId: String!, role: Int!): Boolean! @cost(weight: "10")
  deleteUser(userId: String!): Boolean! @cost(weight: "10")
  requestErasure: Boolean! @cost(weight: "10")
}

