<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d0d0d"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="512" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF6B35"/>
      <stop offset="1" stop-color="#FF8C5A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 256) scale(260)">
      <stop stop-color="#FF6B35" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle orange glow -->
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>

  <!-- Orange accent bar top-left -->
  <rect x="56" y="56" width="80" height="12" rx="6" fill="url(#orange)"/>

  <!-- LETS GO — small label -->
  <text x="256" y="198" fill="#FFFFFF" fill-opacity="0.55" font-family="Arial Black, Arial, sans-serif" font-size="56" font-weight="900" letter-spacing="8" text-anchor="middle">LETS GO</text>

  <!-- KlubN — main word -->
  <text x="256" y="318" fill="url(#orange)" font-family="Arial Black, Arial, sans-serif" font-size="148" font-weight="900" letter-spacing="-6" text-anchor="middle">KlubN</text>

  <!-- Bottom accent line -->
  <rect x="56" y="388" width="400" height="8" rx="4" fill="url(#orange)" opacity="0.35"/>

  <!-- Orange dot top-right -->
  <circle cx="440" cy="72" r="14" fill="#FF6B35"/>
</svg>
