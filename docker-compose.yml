version: '3.8'

services:
  # Reverse Proxy + SSL
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-public"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
    networks:
      - traefik-public

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: djdip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-djdip_db}
      POSTGRES_USER: ${POSTGRES_USER:-djdip_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - djdip-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-djdip_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: djdip-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-djdip_db};Username=${POSTGRES_USER:-djdip_user};Password=${POSTGRES_PASSWORD:-changeme}"
      Jwt__Key: ${JWT_SECRET_KEY}
      Jwt__Issuer: ${JWT_ISSUER:-DJDiP}
      Jwt__Audience: ${JWT_AUDIENCE:-DJDiP}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES:-60}
      CORS__AllowedOrigins: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost}
      AppSettings__BaseUrl: ${BACKEND_URL:-http://localhost:5000}
      AppSettings__FrontendUrl: ${FRONTEND_URL:-http://localhost}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@djdip.com}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:?Set ADMIN_DEFAULT_PASSWORD in .env}
      N8N_SECRET: ${N8N_SECRET:-}
      # Vipps ePayment (P4 adapter live; set PAYMENTS_PROVIDER=Vipps + PROD creds to go live).
      # Privacy note: no Vipps profile scopes / phone / address are ever requested
      # or stored (GDPR, architecture §8). Secrets live in gitignored .env only.
      Vipps__ClientId: ${VIPPS_CLIENT_ID:-}
      Vipps__ClientSecret: ${VIPPS_CLIENT_SECRET:-}
      Vipps__SubscriptionKey: ${VIPPS_SUBSCRIPTION_KEY:-}
      Vipps__Msn: ${VIPPS_MSN:-}
      Vipps__BaseUrl: ${VIPPS_BASE_URL:-https://apitest.vipps.no}
      Vipps__WebhookSecret: ${VIPPS_WEBHOOK_SECRET:-}
      Vipps__SystemName: ${VIPPS_SYSTEM_NAME:-klubn}
      # Stripe (third IPaymentProvider behind the seam; set PAYMENTS_PROVIDER=Stripe to go live).
      # Same fail-fast posture as Vipps: startup fails if SecretKey/WebhookSecret are missing.
      Stripe__SecretKey: ${STRIPE_SECRET_KEY:-}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET:-}
      Stripe__PublishableKey: ${STRIPE_PUBLISHABLE_KEY:-}
      # Ticketing / payments runtime (P4-P9). The backend FAILS FAST at startup when
      # Payments__Provider=Vipps and any of the 4 Vipps creds above is missing.
      Payments__Provider: ${PAYMENTS_PROVIDER:-Sandbox}
      # REQUIRED: HMAC key for ticket QR tokens. Generate once (openssl rand -base64 48)
      # and NEVER rotate casually - changing it invalidates every issued ticket's QR.
      Qr__SigningSecret: ${QR_SIGNING_SECRET:?Set QR_SIGNING_SECRET in .env (rotating it invalidates all issued ticket QRs)}
      Ticketing__CheckoutReturnUrl: ${TICKETING_CHECKOUT_RETURN_URL:-https://klubn.no/checkout/return}
      Ticketing__HoldMinutes: ${TICKETING_HOLD_MINUTES:-10}
      Ticketing__SweepIntervalSeconds: ${TICKETING_SWEEP_INTERVAL_SECONDS:-60}
      Ticketing__SweepGraceMinutes: ${TICKETING_SWEEP_GRACE_MINUTES:-2}
      Email__Enabled: ${EMAIL_ENABLED:-false}
      Email__SmtpHost: ${EMAIL_SMTP_HOST:-smtp.gmail.com}
      Email__SmtpPort: ${EMAIL_SMTP_PORT:-587}
      Email__UseSsl: ${EMAIL_USE_SSL:-false}
      Email__Username: ${EMAIL_USERNAME:-}
      Email__Password: ${EMAIL_PASSWORD:-}
      Email__FromAddress: ${EMAIL_FROM_ADDRESS:-noreply@klubn.com}
      Email__FromName: ${EMAIL_FROM_NAME:-KlubN}
    volumes:
      - uploads:/app/wwwroot/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - djdip-network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.djdip-api.rule=Host(`klubn.no`) && (PathPrefix(`/graphql`) || PathPrefix(`/api`) || PathPrefix(`/health`) || PathPrefix(`/uploads`) || Path(`/sitemap.xml`))"
      - "traefik.http.routers.djdip-api.entrypoints=websecure"
      - "traefik.http.routers.djdip-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.djdip-api.loadbalancer.server.port=5000"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/5000' 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.klubn.com/graphql}
        VITE_WS_URL: ${VITE_WS_URL:-wss://api.klubn.com/graphql}
        VITE_UPLOAD_API_URL: ${VITE_UPLOAD_API_URL:-https://api.klubn.com/api/upload}
    container_name: djdip-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - djdip-network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.djdip-frontend.rule=Host(`klubn.no`) || Host(`www.klubn.no`)"
      - "traefik.http.routers.djdip-frontend.entrypoints=websecure"
      - "traefik.http.routers.djdip-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.djdip-frontend.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  djdip-network:
    driver: bridge
  traefik-public:
    external: true

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local
  letsencrypt:
    driver: local
