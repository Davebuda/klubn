name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20.x'

jobs:
  # Backend Build and Test
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # The repo root holds both DJ-DiP.sln and DJDiP.csproj (+ project files), so bare
    # `dotnet restore`/`build`/`publish` fail with MSB1011 ("more than one project or
    # solution"). Target the solution for restore/build/test and the web composition-root
    # project (DJDiP.csproj) for publish, matching the documented local commands.
    - name: Restore dependencies
      run: dotnet restore DJ-DiP.sln

    - name: Build
      run: dotnet build DJ-DiP.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test Tests/Tests.csproj --configuration Release --no-build --verbosity normal

    - name: Publish
      run: dotnet publish DJDiP.csproj --configuration Release --output ./publish --no-build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: backend-build
        path: ./publish
        retention-days: 7

  # Frontend Build and Test
  frontend-build:
    name: Frontend Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: Frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint || echo "Linting completed with warnings"

    - name: Build
      run: npm run build
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:5000/graphql' }}
        VITE_WS_URL: ${{ secrets.VITE_WS_URL || 'ws://localhost:5000/graphql' }}
        VITE_UPLOAD_API_URL: ${{ secrets.VITE_UPLOAD_API_URL || 'http://localhost:5000/api/upload' }}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: ./Frontend/dist
        retention-days: 7

  # Docker Build
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # The `secrets` context is NOT allowed in `if:` expressions (workflow-parse error that
    # fails the whole run in 0s). Surface the Docker creds as env at the job level so the
    # login step can gate on the `env` context, which IS permitted in `if:`.
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: djdip-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build Frontend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./Frontend
        file: ./Frontend/Dockerfile
        push: false
        tags: djdip-frontend:latest
        build-args: |
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          VITE_WS_URL=${{ secrets.VITE_WS_URL }}
          VITE_UPLOAD_API_URL=${{ secrets.VITE_UPLOAD_API_URL }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Code Quality
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run code analysis
      run: |
        echo "Code quality checks would run here"
        echo "Consider adding: SonarQube, CodeQL, or similar tools"
